# config/repositories.yml
#
# KPort overlay/repository registry.
# Analogous to Portage's repos.conf / eselect repository.
#
# Overlays are searched in priority order (highest first) before the
# main KPort tree (priority 0). A package found in a higher-priority
# overlay shadows the main tree version.
#
# Fields:
#   name:        unique identifier
#   description: human-readable description
#   url:         git URL to clone/pull the overlay from
#   priority:    integer, higher = checked first (main tree = 0)
#   enabled:     false to disable without removing
#   auto_sync:   true to sync on every `kport sync`
#   arch:        list of Debian arch names this overlay applies to
#                (omit to apply to all architectures)

repositories:

  # Main KPort tree — always present, not listed here
  # (implicit, priority 0)

  # Bundled example overlay — demonstrates overlay shadowing.
  # Shadows kf6-karchive with an annotated copy. Safe to disable.
  - name: example
    description: "Bundled example overlay for testing overlay resolution"
    url: "https://github.com/Interested-Deving-1896/KPort.git"
    priority: 10
    enabled: true
    auto_sync: false

  # ── 32-bit x86 (i386) overlays ────────────────────────────────────────────
  # i386 is the default 32-bit architecture (see keywords.yml: arch_default_32bit).
  # Source: Debian sid (patches Qt 6 for 32-bit support).
  # Enable with: kport multiarch enable i386

  # Lightweight packages for i386 — LXQt 1.4, xterm, and toolkit-free apps
  # that build cleanly on 32-bit. Does not require Qt 6.
  - name: community-32bit
    description: "Lightweight i386 (32-bit x86) packages — LXQt 1.4, xterm"
    url: "https://github.com/Interested-Deving-1896/KPort.git"
    priority: 15
    enabled: false
    auto_sync: false
    arch: [i386]

  # KDE Plasma 5.27 LTS for i386. Requires community-32bit (priority 15).
  # Validated against Arch Linux 32 extra repository (Plasma 5.27.7).
  - name: community-32bit-plasma5
    description: "KDE Plasma 5.27 LTS for i386 (32-bit x86)"
    url: "https://github.com/Interested-Deving-1896/KPort.git"
    priority: 20
    enabled: false
    auto_sync: false
    arch: [i386]

  # KDE Plasma 6 / KF6 for i386 via Debian sid.
  # Debian patches Qt 6 to restore 32-bit x86 support.
  # Requires: kport multiarch enable i386
  # Source: debian-sid (config/sources.yml)
  - name: plasma6-i386
    description: "KDE Plasma 6 / KF6 for i386 via Debian sid"
    url: "https://github.com/Interested-Deving-1896/KPort.git"
    priority: 25
    enabled: false
    auto_sync: true
    arch: [i386]

  # ── arm64 overlays ────────────────────────────────────────────────────────
  # Source: Debian sid (full KF6/Qt6 arm64 support).
  # Enable with: kport multiarch enable arm64

  # KDE Plasma 6 / KF6 for arm64 via Debian sid.
  - name: plasma6-arm64
    description: "KDE Plasma 6 / KF6 for arm64 via Debian sid"
    url: "https://github.com/Interested-Deving-1896/KPort.git"
    priority: 25
    enabled: false
    auto_sync: true
    arch: [arm64]

  # ── riscv64 overlays ──────────────────────────────────────────────────────
  # Source: Debian sid + debian-ports (config/sources.yml).
  # Enable with: kport multiarch enable riscv64

  # KDE Plasma 6 / KF6 for riscv64 via Debian sid/ports.
  - name: plasma6-riscv64
    description: "KDE Plasma 6 / KF6 for riscv64 via Debian sid/ports"
    url: "https://github.com/Interested-Deving-1896/KPort.git"
    priority: 25
    enabled: false
    auto_sync: true
    arch: [riscv64]
