# config/keywords.yml
#
# Package stability keywords — controls which packages are visible by default.
# Analogous to Portage's ACCEPT_KEYWORDS and package.accept_keywords.
#
# Stability tiers map to KDE Neon channels:
#   stable    — Neon User Edition (tested, recommended)
#   testing   — Neon Testing Edition (RC-quality, mostly stable)
#   unstable  — Neon Unstable / git builds (may break)
#
# Debian arch names (matching penguins-eggs release targets):
#   amd64    — 64-bit x86 (default; KDE Neon native)
#   i386     — 32-bit x86 (default for 32-bit; Debian sid source)
#   arm64    — 64-bit ARM / AArch64 (Debian sid source)
#   riscv64  — RISC-V 64-bit (Debian ports source)
#
# CPU microarch keywords (ordered lowest → highest within each family):
#   i386/i686:  i686-baseline  i686-sse3
#   x86-64:     x86-64-v1  x86-64-v2  x86-64-v3  x86-64-v4
#   aarch64:    aarch64-v8  aarch64-v8.2  aarch64-v9  aarch64-v9.2
#   riscv64:    riscv64-rv64gc  riscv64-rv64gcv
#
# GPU tier keywords (ordered lowest → highest capability):
#   i386 / legacy x86:  gpu-sw  gpu-gl2  gpu-gl4  (Vulkan not available on 32-bit)
#   x86-64 / discrete:  gpu-sw  gpu-gl2  gpu-gl4  gpu-vk12  gpu-vk13
#   ARM SoC:            gpu-mali-g52  gpu-mali-g610  gpu-immortalis-g715
#                       gpu-adreno-6xx  gpu-adreno-7xx
#   RISC-V SoC:         gpu-img-bxm

accept_keywords:
  stability: [stable, testing, unstable]

  # Default Debian arch — i386 is the default 32-bit variant.
  # KPort selects the appropriate source (Debian sid vs KDE Neon) based on arch.
  arch_default_32bit: i386

  cpu:
    # i386/i686 (32-bit x86) tiers
    - i686-baseline
    - i686-sse3
    # x86-64 tiers
    - x86-64-v1
    - x86-64-v2
    - x86-64-v3
    - x86-64-v4
    # aarch64 tiers
    - aarch64-v8
    - aarch64-v8.2
    - aarch64-v9
    - aarch64-v9.2
    # riscv64 tiers
    - riscv64-rv64gc
    - riscv64-rv64gcv

  gpu:
    # i386 / legacy x86 (Vulkan not available on 32-bit userspace)
    - gpu-sw
    - gpu-gl2
    - gpu-gl4
    # x86-64 / discrete (superset of i386 tiers above)
    - gpu-vk12
    - gpu-vk13
    # ARM SoC GPU tiers
    - gpu-mali-g52
    - gpu-mali-g610
    - gpu-immortalis-g715
    - gpu-adreno-6xx
    - gpu-adreno-7xx
    # RISC-V SoC GPU tiers
    - gpu-img-bxm

# Per-package keyword overrides.
# Users add their own in ~/.config/kport/package.accept_keywords
package_keywords:

  # Accept unstable for specific packages (example):
  # - pkg: plasma/kwin
  #   stability: [stable, testing, unstable]

  # Accept a package only on modern hardware:
  # - pkg: plasma/kwin-effects-vulkan
  #   gpu: [gpu-vk12, gpu-vk13]

  # Accept a package only on 64-bit architectures:
  # - pkg: plasma/kwin
  #   arch: [amd64, arm64, riscv64]
