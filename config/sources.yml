# config/sources.yml
#
# Upstream sources that KPort tracks for package generation.
# Used by scripts/kport/generate-pacscripts.sh and scripts/kport/sync-sources.sh
#
# Each source entry defines where packages come from and how to query them.
#
# Supported architectures (matching penguins-eggs release targets):
#   amd64    — 64-bit x86 (default)
#   i386     — 32-bit x86 (default for 32-bit; enabled via `kport multiarch enable i386`)
#   arm64    — 64-bit ARM / AArch64
#   riscv64  — RISC-V 64-bit

sources:

  # ── KDE Neon ──────────────────────────────────────────────────────────────
  # Primary source for KDE Plasma 6 / KF6 packages (amd64 only — Neon does
  # not ship i386, arm64, or riscv64 packages).
  - name: kde-neon-user
    type: apt
    uri: http://archive.neon.kde.org/user
    suite: jammy
    components: [main]
    arch: [amd64]
    signed-by: /usr/share/keyrings/neon-archive-keyring.gpg
    description: "KDE Neon User Edition — stable Plasma 6 on Ubuntu 22.04"

  - name: kde-neon-testing
    type: apt
    uri: http://archive.neon.kde.org/testing
    suite: jammy
    components: [main]
    arch: [amd64]
    signed-by: /usr/share/keyrings/neon-archive-keyring.gpg
    description: "KDE Neon Testing Edition — RC-quality Plasma 6"

  - name: kde-neon-unstable
    type: apt
    uri: http://archive.neon.kde.org/unstable
    suite: jammy
    components: [main]
    arch: [amd64]
    signed-by: /usr/share/keyrings/neon-archive-keyring.gpg
    description: "KDE Neon Unstable — git snapshot builds"

  # ── Debian sid — all architectures ────────────────────────────────────────
  # Debian sid ships KF6 6.23+ and Qt 6.10+ for all four target architectures.
  # This is the source for i386, arm64, and riscv64 KF6/Qt6 packages since
  # KDE Neon only publishes amd64.
  #
  # i386 note: Debian patches Qt 6 to restore 32-bit x86 support that upstream
  # Qt dropped. These packages are production-quality in Debian sid.
  - name: debian-sid
    type: apt
    uri: http://deb.debian.org/debian
    suite: sid
    components: [main, contrib]
    arch: [amd64, i386, arm64, riscv64]
    signed-by: /usr/share/keyrings/debian-archive-keyring.gpg
    description: "Debian sid — KF6/Qt6 for all architectures including i386"

  # ── Debian ports — riscv64 ────────────────────────────────────────────────
  # riscv64 packages not yet promoted to the main Debian archive.
  - name: debian-ports
    type: apt
    uri: http://deb.debian.org/debian-ports
    suite: sid
    components: [main]
    arch: [riscv64]
    signed-by: /usr/share/keyrings/debian-ports-archive-keyring.gpg
    description: "Debian ports — riscv64 packages not yet in main archive"

  # ── Ubuntu 22.04 (Jammy) — base system ────────────────────────────────────
  # Base system packages for KDE Neon (Ubuntu 22.04 based, amd64 only).
  # i386/arm64/riscv64 use Debian sid as their base.
  - name: ubuntu-jammy
    type: apt
    uri: http://archive.ubuntu.com/ubuntu
    suite: jammy
    components: [main, restricted, universe, multiverse]
    arch: [amd64]
    signed-by: /usr/share/keyrings/ubuntu-archive-keyring.gpg
    description: "Ubuntu 22.04 LTS — base system for KDE Neon (amd64)"

  # ── Arch Linux 32 — i686/i386 community packages ──────────────────────────
  # Arch Linux 32 maintains Plasma 5.27 LTS and selected KF5 packages for i686.
  # Used by the community-32bit-plasma5 overlay as a reference/source.
  - name: archlinux32-extra
    type: pacman
    uri: https://mirror.archlinux32.org
    arch: i686
    description: "Arch Linux 32 extra — Plasma 5.27 LTS reference for i686"
