# config/sources.yml
#
# Upstream sources that KPort tracks for package generation.
# Used by scripts/kport/generate-pacscripts.sh and scripts/kport/sync-sources.sh
#
# Each source entry defines where to fetch packaging metadata from.
# The generator reads debian/control + debian/changelog + debian/watch
# from each repo to produce pacscript skeletons in generated/.
#
# Fields:
#   name:        human-readable label
#   type:        gitlab | github | url
#   base_url:    API base for the host
#   group:       namespace/group path
#   category:    KPort category to generate into
#   branch:      packaging branch to read from (default: Neon/unstable)
#   enabled:     false to skip without removing the entry

sources:

  # KDE Frameworks 6 — Neon packaging
  - name: KDE Frameworks 6 (Neon)
    type: gitlab
    base_url: https://invent.kde.org
    group: neon/kf6
    category: frameworks
    branch: Neon/unstable
    enabled: true

  # KDE Plasma 6 — Neon packaging
  - name: KDE Plasma 6 (Neon)
    type: gitlab
    base_url: https://invent.kde.org
    group: neon/kde
    category: plasma
    branch: Neon/unstable
    enabled: true

  # Qt6 — Neon packaging
  - name: Qt6 (Neon)
    type: gitlab
    base_url: https://invent.kde.org
    group: neon/qt6
    category: qt6
    branch: Neon/unstable
    enabled: true

  # KDE Gear — Neon packaging
  # Gear apps (26.x.x) share the neon/kde group with Plasma (6.x.x).
  # The generator produces all packages; post-processing filters to 26.x.x only.
  - name: KDE Gear (Neon)
    type: gitlab
    base_url: https://invent.kde.org
    group: neon/kde
    category: gear
    branch: Neon/unstable
    enabled: true

  # KDE Craft blueprints — for dependency graph extraction
  - name: KDE Craft Blueprints
    type: github
    base_url: https://api.github.com
    group: KDE/craft-blueprints-kde
    category: _meta
    branch: master
    enabled: true

  # KDE Craft community blueprints
  - name: KDE Craft Community Blueprints
    type: github
    base_url: https://api.github.com
    group: KDE/craft-blueprints-community
    category: _meta
    branch: master
    enabled: true

  # CPU compatibility — x86-64-level
  - name: x86-64-level
    type: github
    base_url: https://api.github.com
    group: HenrikBengtsson/x86-64-level
    category: tools
    branch: main
    enabled: true

  # CPU/hardware info — cpuinfo
  - name: cpuinfo
    type: github
    base_url: https://api.github.com
    group: pytorch/cpuinfo
    category: tools
    branch: main
    enabled: true

  # ── Debian sid — multiarch package sources ──────────────────────────────────
  # Debian sid ships KF6 6.23.0 and Qt 6.10.2 for i386/arm64/riscv64.
  # Debian patches Qt 6 to restore 32-bit support (dropped upstream).
  # Used by the plasma6-i386 / plasma6-arm64 / plasma6-riscv64 overlays.
  # These sources are read-only metadata references; packages are installed
  # via dpkg --add-architecture + apt, not built from source.

  - name: Debian sid (amd64)
    type: url
    base_url: https://deb.debian.org/debian
    group: dists/sid/main
    category: _debian
    arch: amd64
    enabled: true

  - name: Debian sid (i386)
    type: url
    base_url: https://deb.debian.org/debian
    group: dists/sid/main
    category: _debian
    arch: i386
    enabled: true

  - name: Debian sid (arm64)
    type: url
    base_url: https://deb.debian.org/debian
    group: dists/sid/main
    category: _debian
    arch: arm64
    enabled: true

  - name: Debian Ports (riscv64)
    # riscv64 is in debian-ports, not the main archive
    type: url
    base_url: https://deb.debian.org/debian-ports
    group: dists/sid/main
    category: _debian
    arch: riscv64
    enabled: true
