# config/packages/kf6-multiarch.yml
#
# KDE Frameworks 6 and Qt 6 package definitions for non-amd64 architectures.
#
# These packages are sourced from Debian sid (config/sources.yml: debian-sid)
# rather than KDE Neon, because Neon only publishes amd64 packages.
#
# Architectures covered:
#   i386     — 32-bit x86 (Debian patches Qt 6 to restore 32-bit support)
#   arm64    — 64-bit ARM / AArch64
#   riscv64  — RISC-V 64-bit (via debian-ports for some packages)
#
# Package naming convention:
#   <kport-name>:<arch>  maps to  <debian-package>:<arch>
#
# Versions reflect Debian sid at time of writing (KF6 6.23.0, Qt 6.10.2).
# KPort's sync-sources.sh updates these automatically on `kport sync`.
#
# Enable a foreign arch first:
#   kport multiarch enable i386      # or arm64, riscv64, 32bit
#   kport sync
#   kport install plasma-desktop:i386

# ── Qt 6 base ────────────────────────────────────────────────────────────────
qt6:
  source: debian-sid
  arch: [i386, arm64, riscv64]
  packages:
    qt6-base:
      debian: qt6-base-dev
      runtime: [libqt6core6t64, libqt6gui6, libqt6widgets6, libqt6network6]
      version: "~6.10"
    qt6-declarative:
      debian: qt6-declarative-dev
      runtime: [libqt6qml6, libqt6quick6]
      version: "~6.10"
    qt6-wayland:
      debian: qt6-wayland-dev
      runtime: [libqt6waylandclient6, libqt6waylandcompositor6]
      version: "~6.10"
    qt6-multimedia:
      debian: qt6-multimedia-dev
      runtime: [libqt6multimedia6]
      version: "~6.10"
    qt6-svg:
      debian: qt6-svg-dev
      runtime: [libqt6svg6]
      version: "~6.10"
    qt6-tools:
      debian: qt6-tools-dev
      runtime: [libqt6designer6, libqt6help6]
      version: "~6.10"

# ── KDE Frameworks 6 ─────────────────────────────────────────────────────────
# All 72+ KF6 packages available in Debian sid for i386/arm64/riscv64.
# Listed here are the core frameworks required by Plasma 6.
kf6:
  source: debian-sid
  arch: [i386, arm64, riscv64]
  packages:
    kf6-archive:
      debian: libkf6archive-dev
      runtime: [libkf6archive6]
      version: "~6.23"
