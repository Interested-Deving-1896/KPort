# ── Plasma 6 desktop — i386/arm64/riscv64 ────────────────────────────────────
# Plasma 6 desktop packages from Debian sid for non-amd64 architectures.
# On amd64, use KDE Neon packages instead (higher quality, more up-to-date).
plasma6:
  source: debian-sid
  arch: [i386, arm64, riscv64]
  packages:
    plasma-desktop:
      debian: plasma-desktop
      runtime: [plasma-desktop, plasma-workspace, kwin-wayland, kwin-x11]
      version: "~6.3"
      note: "Full Plasma 6 desktop. On i386, Vulkan is unavailable; uses OpenGL 3.3."
    plasma-workspace:
      debian: plasma-workspace
      runtime: [plasma-workspace]
      version: "~6.3"
    kwin:
      debian: kwin-common
      runtime: [kwin-common, kwin-wayland, kwin-x11]
      version: "~6.3"
      arch_notes:
        i386: "Vulkan compositor unavailable on 32-bit; OpenGL 3.3 used instead."
    dolphin:
      debian: dolphin
      runtime: [dolphin]
      version: "~24.12"
    konsole:
      debian: konsole
      runtime: [konsole]
      version: "~24.12"
    kate:
      debian: kate
      runtime: [kate]
      version: "~24.12"
    ark:
      debian: ark
      runtime: [ark]
      version: "~24.12"
    okular:
      debian: okular
      runtime: [okular]
      version: "~24.12"
    gwenview:
      debian: gwenview
      runtime: [gwenview]
      version: "~24.12"
    spectacle:
      debian: spectacle
      runtime: [spectacle]
      version: "~24.12"

# ── i386-specific notes ───────────────────────────────────────────────────────
# Vulkan is not available in 32-bit userspace (no 32-bit Vulkan ICD loaders).
# KWin on i386 uses the OpenGL 3.3 compositor backend.
# GPU keyword gpu-vk12 and gpu-vk13 are masked for i386 (see config/masks.yml).
#
# To install the full Plasma 6 desktop on i386:
#   kport multiarch enable i386
#   kport sync
#   kport install plasma-desktop:i386
#
# To install individual KF6 libraries for cross-compilation:
#   kport install kf6-kio:i386 kf6-solid:i386
