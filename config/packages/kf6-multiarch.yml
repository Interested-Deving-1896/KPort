# ── Plasma 6 desktop ──────────────────────────────────────────────────────────
# kwin and plasma-desktop are masked on i386 (Vulkan dependency).
# Available on arm64 and riscv64.
plasma6:
  - kport_pkg: plasma/plasma-workspace
    debian_pkg: plasma-workspace
    arches: [arm64, riscv64]

  - kport_pkg: plasma/kwin
    debian_pkg: kwin-wayland
    arches: [arm64, riscv64]
    notes: "Masked on i386 — requires Vulkan 1.2"

  - kport_pkg: plasma/plasma-desktop
    debian_pkg: plasma-desktop
    arches: [arm64, riscv64]
    notes: "Masked on i386 — pulls in kwin"

  - kport_pkg: plasma/plasma-nm
    debian_pkg: plasma-nm
    arches: [arm64, riscv64]

  - kport_pkg: plasma/plasma-pa
    debian_pkg: plasma-pa
    arches: [arm64, riscv64]

  - kport_pkg: plasma/dolphin
    debian_pkg: dolphin
    arches: [i386, arm64, riscv64]
    notes: "File manager — no Vulkan dependency, available on i386"

  - kport_pkg: plasma/konsole
    debian_pkg: konsole
    arches: [i386, arm64, riscv64]
    notes: "Terminal — no Vulkan dependency, available on i386"
