# config/packages/kf6-multiarch.yml
#
# KF6 / Qt6 / Plasma6 package name map for non-amd64 architectures.
# Source: Debian sid (i386/arm64) and Debian Ports (riscv64).
#
# Debian sid ships:
#   KDE Frameworks 6.23.0  — all arches including i386/arm64/riscv64
#   Qt 6.10.2              — Debian patches Qt6 to restore 32-bit support
#   Plasma 6.x             — arm64/riscv64 only (kwin masked on i386)
#
# Format:
#   kport_pkg:             KPort canonical package name (category/name)
#   debian_pkg:            Debian binary package name
#   arches:                list of arches this mapping applies to
#   notes:                 optional caveats

# ── Qt 6 base ─────────────────────────────────────────────────────────────────
qt6:
  - kport_pkg: qt6/qt6-base
    debian_pkg: libqt6core6t64
    arches: [i386, arm64, riscv64]

  - kport_pkg: qt6/qt6-base-dev
    debian_pkg: qt6-base-dev
    arches: [i386, arm64, riscv64]

  - kport_pkg: qt6/qt6-declarative
    debian_pkg: libqt6qml6
    arches: [i386, arm64, riscv64]

  - kport_pkg: qt6/qt6-tools
    debian_pkg: qt6-tools-dev
    arches: [i386, arm64, riscv64]

  - kport_pkg: qt6/qt6-svg
    debian_pkg: libqt6svg6
    arches: [i386, arm64, riscv64]

  - kport_pkg: qt6/qt6-multimedia
    debian_pkg: libqt6multimedia6
    arches: [i386, arm64, riscv64]

  - kport_pkg: qt6/qt6-wayland
    debian_pkg: libqt6waylandclient6
    arches: [arm64, riscv64]
    notes: "Wayland compositor not available on i386 (kwin masked)"

  - kport_pkg: qt6/qt6-shadertools
    debian_pkg: libqt6shadertools6
    arches: [arm64, riscv64]
    notes: "Requires Vulkan 1.2 — masked on i386"

